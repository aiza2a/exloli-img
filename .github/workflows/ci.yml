name: CI and image publish

on:
  push:
    branches: [master, maintenance/docs-ci-container]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  quality:
    name: Rust quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Remove trailing whitespace
        run: find src -type f -name '*.rs' -print0 | xargs -0 sed -i 's/[[:space:]]*$//'
      - name: Format source
        run: cargo fmt --all
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "Rust source is already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- Cargo.toml src
          git commit -m "style: format Rust source"
          git push
      - name: Verify format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets
      - name: Unit tests
        run: cargo test --lib ehentai::types::tests
      - name: Release compile check
        run: cargo check --release --locked

  image:
    name: Build and publish image
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/exloli-imgx
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
